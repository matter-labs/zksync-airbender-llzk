name: "Rust CI"
on:
  push:
    branches:
      - main
      - stable
      - dev
  pull_request:

permissions: read-all

env:
  RUST_TOOLCHAIN: nightly-2026-02-10

jobs:
  tests:
    name: tests
    runs-on: [matterlabs-ci-runner-high-performance]
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          rustflags: ""
      - name: Setup
        run: |
          rustup set profile minimal
          rustup target add riscv32im-unknown-none-elf
          rustup component add llvm-tools
      - name: Install cargo-binutils
        run: cargo install cargo-binutils --locked
      - name: Compile
        run: cargo build --verbose
      - name: Unit tests (CI)
        env:
          CI: "true"
        # --test-threads 1 is required to keep peak RSS in bounds, and it is
        # actually faster than parallel execution here: parallel runs thrash
        # CPU caches badly enough that serial execution wins overall.
        run: cargo test --profile cli -- --nocapture --test-threads 1

  formatting:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
          rustflags: ""
      - name: Setup
        run: |
          rustup set profile minimal
      - name: Rustfmt Check
        uses: actions-rust-lang/rustfmt@v1

  circuits_generated:
    name: circuits_generated
    runs-on: [matterlabs-ci-runner-c3d]
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
          rustflags: ""
      - name: Setup
        run: |
          rustup set profile default
      - name: Regenerate verifiers
        run: ./recreate_verifiers.sh
      - name: Check if anything has changed
        run: |
          MODIFIED_FILES=$(git status --porcelain)
          if [ -n "$MODIFIED_FILES" ]; then
            echo "The following files were modified - did you run ./recreate_verifiers.sh? "
            echo "$MODIFIED_FILES"
            exit 1
          else
            echo "No files were modified."
          fi

  check_verifiers:
    name: check_verifiers
    runs-on: [matterlabs-ci-runner-c3d]
    steps:
      - uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8 # v3

      - name: Build fresh verifiers
        run: |
          tools/reproduce/reproduce.sh

      - name: Fail if any files were modified
        run: |
          git status --porcelain
          git diff --name-only
          if [ -n "$(git diff --name-only)" ]; then
            echo "❌ The following files were modified. Did you run tools/reproduce/reproduce.sh?:"
            git diff --name-only
            exit 1
          fi

  build_cli:
    name: build_cli
    runs-on: [matterlabs-ci-runner-c3d]
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          rustflags: ""
      - name: Setup
        run: rustup set profile minimal
      - name: Compile
        run: cargo build --release -p cli
      - uses: actions/upload-artifact@v4
        with:
          name: cli
          path: |
            target/release/cli
            examples/opcode_smoke/app.bin
            examples/opcode_smoke/app.text
            examples/opcode_smoke/input.txt

  cli_smoke_verify:
    name: cli_smoke_verify (${{ matrix.security_level }})
    runs-on: [matterlabs-ci-runner-c3d]
    needs: [build_cli]
    strategy:
      fail-fast: false
      matrix:
        security_level: ["80", "100"]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cli
      - name: Setup
        run: |
          chmod +x ./target/release/cli
          mkdir -p output
      - name: Prove base
        run: |
          BIN="$PWD/examples/opcode_smoke/app.bin"
          TEXT="$PWD/examples/opcode_smoke/app.text"
          INPUT="$PWD/examples/opcode_smoke/input.txt"
          ./target/release/cli prove --bin "$BIN" --text "$TEXT" --input-file "$INPUT" --security-level ${{ matrix.security_level }} --target base --backend cpu --cpu-cycles-bound 16777216 --cpu-worker-threads 8 --output-dir output --output-file base.json
      - name: Verify base
        run: |
          BIN="$PWD/examples/opcode_smoke/app.bin"
          TEXT="$PWD/examples/opcode_smoke/app.text"
          verify_output="$(./target/release/cli verify --proof output/base.json --bin "$BIN" --text "$TEXT")"
          echo "$verify_output"
          echo "$verify_output" | grep -F "output=[1330660171, 0, 0, 42, 2374183677, 305419896, 524296, 0"
      - name: Continue to recursion unified
        run: |
          BIN="$PWD/examples/opcode_smoke/app.bin"
          TEXT="$PWD/examples/opcode_smoke/app.text"
          ./target/release/cli continue-proof --proof output/base.json --bin "$BIN" --text "$TEXT" --target recursion-unified --cpu-cycles-bound 16777216 --cpu-worker-threads 8 --output-dir output --output-file recursion_unified.json
      - name: Verify recursion unified
        run: |
          BIN="$PWD/examples/opcode_smoke/app.bin"
          TEXT="$PWD/examples/opcode_smoke/app.text"
          verify_output="$(./target/release/cli verify --proof output/recursion_unified.json --bin "$BIN" --text "$TEXT")"
          echo "$verify_output"
          echo "$verify_output" | grep -F "output=[1330660171, 0, 0, 42, 2374183677, 305419896, 524296, 0"

  miri:
    name: miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: miri
      - name: Run Miri tests
        run: cargo miri test -p riscv_transpiler -- miri_
  
  # Examples that are tests themselves should be run explicitly
  example-tests:
    name: riscv-examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          rustflags: ""
      - name: Build CLI
        run: cargo build --release -p cli
      - name: Run keccak_f1600 test on RISC-V
        run: ./target/release/cli run -b examples/keccak/app.bin --text examples/keccak/app.text --cycles 1000000 --expected-results 0,0,0,0,0,0,0,0
      - name: Run bigint test on RISC-V
        run: ./target/release/cli run -b examples/bigint_with_control/app.bin --text examples/bigint_with_control/app.text --cycles 1000000 --expected-results 0,0,0,0,0,0,0,0

  # Keep branch protection tied to one stable check name even as the
  # underlying CI fan-out changes over time.
  pr-checks:
    name: pr-checks
    runs-on: ubuntu-latest
    if: always()
    needs:
      - tests
      - formatting
      - circuits_generated
      - check_verifiers
      - build_cli
      - cli_smoke_verify
      - miri
      - example-tests
    steps:
      - name: Decide on PR checks
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
